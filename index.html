<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="https://github.githubassets.com/favicons/favicon.svg"
      type="image/svg+xml"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- DaisyUI + Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      :root {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-card: #21262d;
        --bg-hover: #30363d;
        --border: #30363d;
        --border-muted: #21262d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --accent-green: #3fb950;
        --accent-purple: #a371f7;
        --accent-blue: #388bfd;
        --accent-orange: #d29922;
        --accent-red: #f85149;
        --open-border: #3fb950;
        --closed-border: #a371f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Sora", sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        margin: 0;
      }

      /* ─── LOGIN PAGE ─── */
      #login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        position: relative;
        overflow: hidden;
      }

      #login-page::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(163, 113, 247, 0.12) 0%,
          transparent 70%
        );
        top: -150px;
        right: -150px;
        pointer-events: none;
      }

      #login-page::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(63, 185, 80, 0.08) 0%,
          transparent 70%
        );
        bottom: -100px;
        left: -100px;
        pointer-events: none;
      }

      .login-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .login-logo svg {
        width: 40px;
        height: 40px;
        fill: var(--text-primary);
      }

      .login-title {
        font-size: 26px;
        font-weight: 700;
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 6px;
      }

      .login-subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      .form-group input {
        width: 100%;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: "JetBrains Mono", monospace;
        outline: none;
        transition: border-color 0.2s;
      }

      .form-group input:focus {
        border-color: var(--accent-blue);
      }

      .btn-signin {
        width: 100%;
        background: var(--accent-green);
        color: #0d1117;
        font-weight: 700;
        font-size: 14px;
        padding: 11px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
        margin-top: 8px;
      }

      .btn-signin:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }
      .btn-signin:active {
        transform: translateY(0);
      }

      .demo-cred {
        margin-top: 20px;
        background: var(--bg-card);
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        line-height: 1.8;
      }

      .demo-cred strong {
        color: var(--accent-orange);
        font-family: "JetBrains Mono", monospace;
      }

      .error-msg {
        background: rgba(248, 81, 73, 0.1);
        border: 1px solid rgba(248, 81, 73, 0.3);
        color: var(--accent-red);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 14px;
        display: none;
      }

      /* ─── MAIN PAGE ─── */
      #main-page {
        display: none;
        min-height: 100vh;
      }

      /* Navbar */
      .navbar {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 17px;
        color: var(--text-primary);
        text-decoration: none;
      }

      .navbar-brand svg {
        width: 28px;
        height: 28px;
        fill: var(--text-primary);
      }

      .search-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        max-width: 400px;
        margin: 0 24px;
      }

      .search-input {
        flex: 1;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 14px;
        color: var(--text-primary);
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }

      .search-input:focus {
        border-color: var(--accent-blue);
      }
      .search-input::placeholder {
        color: var(--text-muted);
      }

      .btn-search {
        background: var(--accent-blue);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        white-space: nowrap;
      }

      .btn-search:hover {
        opacity: 0.85;
      }

      .btn-logout {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        border-radius: 8px;
        padding: 7px 14px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .btn-logout:hover {
        border-color: var(--accent-red);
        color: var(--accent-red);
      }

      /* Main Content */
      .main-content {
        padding: 28px 24px;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Tab + Summary Row */
      .tab-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .tab-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .issue-count-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .issue-count-badge i {
        color: var(--text-muted);
        font-size: 16px;
      }

      .count-num {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 15px;
        color: var(--text-primary);
      }

      .tab-right {
        display: flex;
        gap: 6px;
      }

      .tab-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        border-radius: 8px;
        padding: 7px 18px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Sora", sans-serif;
      }

      .tab-btn:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }

      .tab-btn.active-all {
        background: var(--accent-blue);
        border-color: var(--accent-blue);
        color: #fff;
        font-weight: 600;
      }
      .tab-btn.active-open {
        background: var(--accent-green);
        border-color: var(--accent-green);
        color: #0d1117;
        font-weight: 600;
      }
      .tab-btn.active-closed {
        background: var(--accent-purple);
        border-color: var(--accent-purple);
        color: #fff;
        font-weight: 600;
      }

      /* Status indicators */
      .status-indicators {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 500;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .dot-open {
        background: var(--accent-green);
      }
      .dot-closed {
        background: var(--accent-purple);
      }

      /* Cards Grid */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      @media (max-width: 1200px) {
        .cards-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 900px) {
        .cards-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 580px) {
        .cards-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Issue Card */
      .issue-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.18s,
          box-shadow 0.18s,
          border-color 0.18s;
        animation: cardIn 0.35s ease both;
        display: flex;
        flex-direction: column;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .issue-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        border-color: var(--bg-hover);
      }

      .card-top-border {
        height: 4px;
        width: 100%;
      }
      .card-top-border.open {
        background: var(--open-border);
      }
      .card-top-border.closed {
        background: var(--closed-border);
      }

      .card-body {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-description {
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 20px;
        white-space: nowrap;
      }

      .badge-open {
        background: rgba(63, 185, 80, 0.15);
        color: var(--accent-green);
        border: 1px solid rgba(63, 185, 80, 0.25);
      }
      .badge-closed {
        background: rgba(163, 113, 247, 0.15);
        color: var(--accent-purple);
        border: 1px solid rgba(163, 113, 247, 0.25);
      }
      .badge-label {
        background: rgba(56, 139, 253, 0.15);
        color: var(--accent-blue);
        border: 1px solid rgba(56, 139, 253, 0.25);
      }
      .badge-high {
        background: rgba(248, 81, 73, 0.12);
        color: var(--accent-red);
        border: 1px solid rgba(248, 81, 73, 0.2);
      }
      .badge-medium {
        background: rgba(210, 153, 34, 0.12);
        color: var(--accent-orange);
        border: 1px solid rgba(210, 153, 34, 0.2);
      }
      .badge-low {
        background: rgba(63, 185, 80, 0.12);
        color: var(--accent-green);
        border: 1px solid rgba(63, 185, 80, 0.2);
      }

      .card-footer {
        padding: 10px 16px;
        border-top: 1px solid var(--border-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .card-author {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .avatar-sm {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--accent-purple),
          var(--accent-blue)
        );
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }

      .card-date {
        font-size: 10px;
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
      }

      /* ─── LOADING ─── */
      .loading-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(13, 17, 23, 0.7);
        z-index: 200;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
      }

      .loading-overlay.active {
        display: flex;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--accent-green);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* ─── MODAL ─── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 300;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(4px);
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-box {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 16px;
        width: 100%;
        max-width: 680px;
        max-height: 85vh;
        overflow-y: auto;
        animation: modalIn 0.25s ease both;
        position: relative;
      }

      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .modal-top-border {
        height: 5px;
        border-radius: 16px 16px 0 0;
      }
      .modal-top-border.open {
        background: linear-gradient(90deg, var(--open-border), #26a641);
      }
      .modal-top-border.closed {
        background: linear-gradient(90deg, var(--closed-border), #8957e5);
      }

      .modal-header {
        padding: 20px 24px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.4;
      }

      .btn-close {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 8px;
        width: 32px;
        height: 32px;
        cursor: pointer;
        font-size: 16px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .btn-close:hover {
        border-color: var(--accent-red);
        color: var(--accent-red);
      }

      .modal-body {
        padding: 20px 24px;
      }

      .modal-desc {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.7;
        margin-bottom: 20px;
        background: var(--bg-card);
        border-radius: 8px;
        padding: 14px;
        border: 1px solid var(--border-muted);
      }

      .modal-meta-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      @media (max-width: 480px) {
        .modal-meta-grid {
          grid-template-columns: 1fr;
        }
      }

      .meta-item {
        background: var(--bg-card);
        border: 1px solid var(--border-muted);
        border-radius: 8px;
        padding: 12px;
      }

      .meta-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .meta-value {
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 500;
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 64px 20px;
        color: var(--text-muted);
        display: none;
      }

      .empty-state i {
        font-size: 48px;
        margin-bottom: 16px;
        display: block;
        opacity: 0.4;
      }
      .empty-state p {
        font-size: 15px;
      }

      /* Responsive navbar */
      @media (max-width: 640px) {
        .navbar {
          flex-wrap: wrap;
          gap: 10px;
        }
        .search-wrapper {
          max-width: 100%;
          margin: 0;
          order: 3;
          width: 100%;
        }
        .btn-logout span {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <!-- ─── LOADING OVERLAY ─── -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-text">Fetching issues…</span>
    </div>

    <!-- ══════════ LOGIN PAGE ══════════ -->
    <div id="login-page">
      <div class="login-card">
        <div class="login-logo">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
              1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
              0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68
              0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
              0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
              8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
          <span style="font-size: 22px; font-weight: 800">IssueTracker</span>
        </div>
        <p class="login-title">Welcome back</p>
        <p class="login-subtitle">
          Sign in to access your GitHub issues dashboard
        </p>

        <div class="error-msg" id="login-error">
          <i class="fa-solid fa-circle-exclamation"></i> Invalid username or
          password.
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter username"
            autocomplete="username"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-signin" id="signin-btn">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>

        <div class="demo-cred">
          <div
            style="
              margin-bottom: 4px;
              font-weight: 600;
              color: var(--text-secondary);
            "
          >
            Demo Credentials
          </div>
          Username: <strong>admin</strong> &nbsp;|&nbsp; Password:
          <strong>admin123</strong>
        </div>
      </div>
    </div>

    <!-- ══════════ MAIN PAGE ══════════ -->
    <div id="main-page">
      <!-- Navbar -->
      <nav class="navbar">
        <a href="#" class="navbar-brand">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
              1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
              0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68
              0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
              0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
              8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
          IssueTracker
        </a>
        <div class="search-wrapper">
          <input
            class="search-input"
            type="text"
            id="search-input"
            placeholder="Search issues…"
          />
          <button class="btn-search" id="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i> Search
          </button>
        </div>
        <button class="btn-logout" id="logout-btn">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </nav>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Tab Bar -->
        <div class="tab-bar">
          <div class="tab-left">
            <div class="issue-count-badge">
              <i class="fa-solid fa-circle-dot"></i>
              <span class="count-num" id="issue-count">0</span>
              <span id="issue-label-text">issues</span>
            </div>
            <div class="status-indicators" style="margin-left: 16px">
              <div class="status-pill">
                <span class="dot dot-open"></span
                ><span
                  style="font-size: 11px; color: var(--text-muted)"
                  id="open-count-label"
                  >Open</span
                >
              </div>
              <div class="status-pill">
                <span class="dot dot-closed"></span
                ><span
                  style="font-size: 11px; color: var(--text-muted)"
                  id="closed-count-label"
                  >Closed</span
                >
              </div>
            </div>
          </div>
          <div class="tab-right">
            <button class="tab-btn active-all" data-tab="all">All</button>
            <button class="tab-btn" data-tab="open">Open</button>
            <button class="tab-btn" data-tab="closed">Closed</button>
          </div>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cards-grid"></div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
          <i class="fa-solid fa-circle-exclamation"></i>
          <p>No issues found.</p>
        </div>
      </div>
    </div>

    <!-- ─── MODAL ─── -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box" id="modal-box">
        <div class="modal-top-border" id="modal-top-border"></div>
        <div class="modal-header">
          <div class="modal-title" id="modal-title"></div>
          <button class="btn-close" id="modal-close">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-desc" id="modal-desc"></div>
          <div class="modal-meta-grid" id="modal-meta"></div>
        </div>
      </div>
    </div>

    <script>
      // ── Config ──
      const API_BASE = "https://phi-lab-server.vercel.app/api/v1/lab";
      const DEMO_USER = "admin";
      const DEMO_PASS = "admin123";

      // ── State ──
      let allIssues = [];
      let currentTab = "all";

      // ── Elements ──
      const loginPage = document.getElementById("login-page");
      const mainPage = document.getElementById("main-page");
      const loginError = document.getElementById("login-error");
      const loadingOverlay = document.getElementById("loading-overlay");
      const cardsGrid = document.getElementById("cards-grid");
      const emptyState = document.getElementById("empty-state");
      const issueCount = document.getElementById("issue-count");
      const openCountLbl = document.getElementById("open-count-label");
      const closedCountLbl = document.getElementById("closed-count-label");
      const modalOverlay = document.getElementById("modal-overlay");

      // ── Login ──
      function doLogin() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if (u === DEMO_USER && p === DEMO_PASS) {
          loginError.style.display = "none";
          loginPage.style.display = "none";
          mainPage.style.display = "block";
          loadIssues();
        } else {
          loginError.style.display = "block";
        }
      }

      document.getElementById("signin-btn").addEventListener("click", doLogin);
      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
      document.getElementById("username").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      // ── Logout ──
      document.getElementById("logout-btn").addEventListener("click", () => {
        mainPage.style.display = "none";
        loginPage.style.display = "flex";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
      });

      // ── Loading ──
      function showLoading() {
        loadingOverlay.classList.add("active");
      }
      function hideLoading() {
        loadingOverlay.classList.remove("active");
      }

      // ── Fetch all issues ──
      async function loadIssues() {
        showLoading();
        try {
          const res = await fetch(`${API_BASE}/issues`);
          const data = await res.json();
          allIssues = Array.isArray(data)
            ? data
            : data.issues || data.data || [];
          updateCounts();
          renderCards(filtered());
        } catch (e) {
          console.error(e);
          renderCards([]);
        }
        hideLoading();
      }

      // ── Search ──
      async function doSearch(q) {
        if (!q.trim()) {
          renderCards(filtered());
          return;
        }
        showLoading();
        try {
          const res = await fetch(
            `${API_BASE}/issues/search?q=${encodeURIComponent(q)}`,
          );
          const data = await res.json();
          const results = Array.isArray(data)
            ? data
            : data.issues || data.data || [];
          renderCards(results);
          issueCount.textContent = results.length;
        } catch (e) {
          console.error(e);
          renderCards([]);
        }
        hideLoading();
      }

      document.getElementById("search-btn").addEventListener("click", () => {
        doSearch(document.getElementById("search-input").value);
      });

      document
        .getElementById("search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter")
            doSearch(document.getElementById("search-input").value);
        });

      // ── Tab logic ──
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach((b) => {
            b.className = "tab-btn";
          });
          currentTab = btn.dataset.tab;
          btn.classList.add(`active-${currentTab}`);
          document.getElementById("search-input").value = "";
          renderCards(filtered());
          issueCount.textContent = filtered().length;
        });
      });

      function filtered() {
        if (currentTab === "all") return allIssues;
        return allIssues.filter(
          (i) => (i.state || i.status || "").toLowerCase() === currentTab,
        );
      }

      function updateCounts() {
        const open = allIssues.filter(
          (i) => (i.state || i.status || "").toLowerCase() === "open",
        ).length;
        const closed = allIssues.filter(
          (i) => (i.state || i.status || "").toLowerCase() === "closed",
        ).length;
        issueCount.textContent = allIssues.length;
        openCountLbl.textContent = `${open} Open`;
        closedCountLbl.textContent = `${closed} Closed`;
      }

      // ── Render cards ──
      function renderCards(issues) {
        cardsGrid.innerHTML = "";
        if (!issues.length) {
          emptyState.style.display = "block";
          return;
        }
        emptyState.style.display = "none";
        issueCount.textContent = issues.length;

        issues.forEach((issue, i) => {
          const status = (issue.state || issue.status || "open").toLowerCase();
          const isOpen = status === "open";
          const priority = (issue.priority || "").toLowerCase();
          const label = issue.label || issue.labels || "";
          const author =
            issue.author || issue.user?.login || issue.created_by || "Unknown";
          const createdAt = issue.created_at || issue.createdAt || "";
          const date = createdAt
            ? new Date(createdAt).toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
                year: "numeric",
              })
            : "";
          const initials = author.substring(0, 2).toUpperCase();

          const card = document.createElement("div");
          card.className = "issue-card";
          card.style.animationDelay = `${i * 0.04}s`;
          card.innerHTML = `
            <div class="card-top-border ${isOpen ? "open" : "closed"}"></div>
            <div class="card-body">
              <div class="card-title">${escHtml(issue.title || "Untitled")}</div>
              <div class="card-description">${escHtml(issue.description || issue.body || "No description provided.")}</div>
              <div class="card-meta">
                <span class="badge ${isOpen ? "badge-open" : "badge-closed"}">
                  <i class="fa-solid ${isOpen ? "fa-circle-dot" : "fa-circle-check"}"></i>
                  ${isOpen ? "Open" : "Closed"}
                </span>
                ${priority ? `<span class="badge badge-${priority === "high" ? "high" : priority === "medium" ? "medium" : "low"}">${capitalize(priority)}</span>` : ""}
                ${label ? `<span class="badge badge-label"><i class="fa-solid fa-tag"></i> ${escHtml(Array.isArray(label) ? label[0] : label)}</span>` : ""}
              </div>
            </div>
            <div class="card-footer">
              <div class="card-author">
                <span class="avatar-sm">${initials}</span>
                ${escHtml(author)}
              </div>
              <span class="card-date">${date}</span>
            </div>
          `;
          card.addEventListener("click", () => openModal(issue));
          cardsGrid.appendChild(card);
        });
      }

      // ── Modal ──
      async function openModal(issue) {
        // Try to fetch full details
        let full = issue;
        const id = issue.id || issue.number;
        if (id) {
          try {
            const res = await fetch(`${API_BASE}/issue/${id}`);
            const data = await res.json();
            full = data.issue || data.data || data || issue;
          } catch (e) {}
        }

        const status = (full.state || full.status || "open").toLowerCase();
        const isOpen = status === "open";
        const priority = full.priority || "—";
        const label = full.label || full.labels || "—";
        const author =
          full.author || full.user?.login || full.created_by || "Unknown";
        const createdAt = full.created_at || full.createdAt || "";
        const date = createdAt
          ? new Date(createdAt).toLocaleString("en-US", {
              dateStyle: "medium",
              timeStyle: "short",
            })
          : "—";

        document.getElementById("modal-top-border").className =
          `modal-top-border ${isOpen ? "open" : "closed"}`;
        document.getElementById("modal-title").textContent =
          full.title || "Untitled";
        document.getElementById("modal-desc").textContent =
          full.description || full.body || "No description provided.";

        document.getElementById("modal-meta").innerHTML = `
          <div class="meta-item">
            <div class="meta-label">Status</div>
            <div class="meta-value">
              <span class="badge ${isOpen ? "badge-open" : "badge-closed"}">
                <i class="fa-solid ${isOpen ? "fa-circle-dot" : "fa-circle-check"}"></i>
                ${isOpen ? "Open" : "Closed"}
              </span>
            </div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Author</div>
            <div class="meta-value" style="display:flex;align-items:center;gap:6px;">
              <span class="avatar-sm" style="width:22px;height:22px;">${author.substring(0, 2).toUpperCase()}</span>
              ${escHtml(author)}
            </div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Priority</div>
            <div class="meta-value">
              ${priority !== "—" ? `<span class="badge badge-${priority.toLowerCase() === "high" ? "high" : priority.toLowerCase() === "medium" ? "medium" : "low"}">${capitalize(priority)}</span>` : "—"}
            </div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Label</div>
            <div class="meta-value">
              ${label !== "—" ? `<span class="badge badge-label"><i class="fa-solid fa-tag"></i> ${escHtml(Array.isArray(label) ? label.join(", ") : label)}</span>` : "—"}
            </div>
          </div>
          <div class="meta-item" style="grid-column:1/-1;">
            <div class="meta-label">Created At</div>
            <div class="meta-value" style="font-family:'JetBrains Mono',monospace;font-size:12px;">${date}</div>
          </div>
          ${full.number ? `<div class="meta-item"><div class="meta-label">Issue #</div><div class="meta-value" style="font-family:'JetBrains Mono',monospace;">#${full.number}</div></div>` : ""}
        `;

        modalOverlay.classList.add("active");
      }

      document
        .getElementById("modal-close")
        .addEventListener("click", () =>
          modalOverlay.classList.remove("active"),
        );
      modalOverlay.addEventListener("click", (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove("active");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") modalOverlay.classList.remove("active");
      });

      // ── Helpers ──
      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      function capitalize(s) {
        return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
      }
    </script>
  </body>
</html>
